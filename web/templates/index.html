<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智谱 CodingPlan 抢购监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #00d9ff;
        }
        .panel {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #0f3460;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        .status-dot.idle { background: #888; }
        .status-dot.warming { background: #ffc107; }
        .status-dot.buying { background: #00d9ff; }
        .status-dot.success { background: #00ff88; }
        .status-dot.failed { background: #ff4444; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #00d9ff;
            color: #000;
        }
        .btn-primary:hover {
            background: #00b8d9;
        }
        .btn-danger {
            background: #ff4444;
            color: #fff;
        }

        .logs {
            background: #0a0a15;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
        .logs .line {
            padding: 2px 0;
            border-bottom: 1px solid #1a1a2e;
        }
        .logs .line.error {
            color: #ff4444;
        }
        .logs .line.info {
            color: #00d9ff;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .target-info {
            background: #0f3460;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>智谱 CodingPlan 抢购监控</h1>

        <div class="panel">
            <div class="status-bar">
                <div class="status-indicator">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">空闲</span>
                    <span class="target-info" id="targetInfo"></span>
                </div>
                <div class="actions">
                    <button class="btn btn-primary" onclick="triggerLogin()">登录</button>
                    <button class="btn btn-primary" onclick="triggerPurchase()">手动抢购</button>
                </div>
            </div>

            <h3>实时日志</h3>
            <div class="logs" id="logs">
                <div class="line">等待日志...</div>
            </div>
        </div>
    </div>

    <script>
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const targetInfo = document.getElementById('targetInfo');
        const logsDiv = document.getElementById('logs');

        const statusMap = {
            'idle': { text: '空闲', class: 'idle' },
            'warming': { text: '预热中', class: 'warming' },
            'buying': { text: '抢购中', class: 'buying' },
            'success': { text: '抢购成功!', class: 'success' },
            'failed': { text: '抢购失败', class: 'failed' },
            'error': { text: '错误', class: 'failed' }
        };

        function updateStatus() {
            fetch('/api/status')
                .then(r => r.json())
                .then(data => {
                    const s = statusMap[data.status] || statusMap['idle'];
                    statusDot.className = 'status-dot ' + s.class;
                    statusText.textContent = s.text;

                    if (data.target) {
                        targetInfo.textContent = `目标: ${data.target.plan} - ${data.target.duration}`;
                    }
                });
        }

        function updateLogs() {
            fetch('/api/logs')
                .then(r => r.json())
                .then(data => {
                    if (data.logs && data.logs.length > 0) {
                        logsDiv.innerHTML = data.logs.map(line => {
                            const cls = line.includes('ERROR') ? 'error' : 'info';
                            return `<div class="line ${cls}">${escapeHtml(line)}</div>`;
                        }).join('');
                        logsDiv.scrollTop = logsDiv.scrollHeight;
                    }
                });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function triggerLogin() {
            fetch('/api/login', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    alert(data.success ? '登录成功' : '登录失败');
                });
        }

        function triggerPurchase() {
            if (!confirm('确定要手动触发抢购吗？')) return;

            fetch('/api/trigger', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    alert(data.success ? '抢购成功!' : '抢购失败');
                });
        }

        // 定时刷新
        setInterval(updateStatus, 2000);
        setInterval(updateLogs, 3000);
        updateStatus();
        updateLogs();
    </script>
</body>
</html>
