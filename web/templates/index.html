<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智谱 CodingPlan 多账号抢购监控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; color: #00d9ff; }

        /* Tab 导航 */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            background: #16213e;
            border: none;
            color: #888;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            position: relative;
        }
        .tab.active {
            background: #0f3460;
            color: #00d9ff;
        }
        .tab .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4444;
            color: #fff;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            display: none;
        }
        .tab .badge.show { display: block; }

        .panel {
            background: #16213e;
            border-radius: 0 10px 10px 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        /* 账号列表 */
        .account-table {
            width: 100%;
            border-collapse: collapse;
        }
        .account-table th, .account-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #0f3460;
        }
        .account-table th {
            color: #00d9ff;
            font-weight: normal;
        }

        /* 状态指示器 */
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.idle { background: #888; }
        .status-dot.buying { background: #00d9ff; animation: pulse 1s infinite; }
        .status-dot.success { background: #00ff88; }
        .status-dot.failed { background: #ff4444; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 按钮 */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            margin: 2px;
        }
        .btn-primary { background: #00d9ff; color: #000; }
        .btn-success { background: #00ff88; color: #000; }
        .btn-danger { background: #ff4444; color: #fff; }
        .btn-secondary { background: #666; color: #fff; }
        .btn:hover { opacity: 0.8; }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
        }
        .modal.show { display: flex; justify-content: center; align-items: center; }
        .modal-content {
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content h3 { margin-bottom: 15px; color: #00d9ff; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #888; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            background: #0f3460;
            border: 1px solid #1a1a2e;
            color: #eee;
            border-radius: 5px;
        }

        /* 日志 */
        .logs {
            background: #0a0a15;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        .logs .line { padding: 2px 0; border-bottom: 1px solid #1a1a2e; }
        .logs .line.error { color: #ff4444; }
        .logs .line.success { color: #00ff88; }

        /* 控制面板 */
        .control-panel {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        /* 目标套餐标签 */
        .plan-tag {
            display: inline-block;
            padding: 2px 8px;
            background: #0f3460;
            border-radius: 3px;
            font-size: 12px;
            margin-right: 4px;
        }
        .plan-tag.priority-1 { background: #00d9ff; color: #000; }
        .plan-tag.priority-2 { background: #00ff88; color: #000; }
        .plan-tag.priority-3 { background: #ffc107; color: #000; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 待支付订单卡片 */
        .order-card {
            background: #0f3460;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #ffc107;
        }
        .order-card h4 { color: #ffc107; margin-bottom: 10px; }
        .order-card p { margin: 5px 0; color: #aaa; font-size: 13px; }
        .order-card .order-actions { margin-top: 10px; }
        .order-card .pay-link {
            display: inline-block;
            background: #ffc107;
            color: #000;
            padding: 8px 16px;
            border-radius: 5px;
            text-decoration: none;
            margin-right: 10px;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        /* 套餐选择器 */
        .plan-selector {
            background: #0f3460;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
        }
        .plan-option {
            display: flex;
            align-items: center;
            padding: 8px;
            margin: 5px 0;
            background: #16213e;
            border-radius: 5px;
        }
        .plan-option input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 10px;
        }
        .plan-option .plan-name {
            flex: 1;
            color: #eee;
        }
        .plan-option .priority-select {
            width: 80px;
            padding: 5px;
            background: #0f3460;
            color: #eee;
            border: none;
            border-radius: 3px;
        }
        .plan-option.disabled {
            opacity: 0.5;
        }
        .plan-option.disabled .priority-select {
            display: none;
        }

        /* 模态框底部 */
        .modal-footer {
            text-align: right;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #0f3460;
        }

        /* 成功率显示 */
        .success-rate {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            margin-left: 8px;
            min-width: 50px;
            text-align: center;
        }
        .success-rate.high { background: #00ff88; color: #000; }
        .success-rate.medium { background: #ffc107; color: #000; }
        .success-rate.low { background: #ff4444; color: #fff; }
        .success-rate.none { background: #666; color: #fff; }

        .plan-stats-hint {
            font-size: 11px;
            color: #888;
            margin-top: 8px;
            padding: 8px;
            background: #0a0a15;
            border-radius: 5px;
        }
        .plan-stats-hint .rank {
            color: #00d9ff;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>智谱 CodingPlan 多账号抢购监控</h1>

        <div class="tabs">
            <button class="tab active" onclick="showTab('accounts')">账号管理</button>
            <button class="tab" onclick="showTab('monitor')">抢购监控</button>
            <button class="tab" onclick="showTab('notifications')">
                通知
                <span class="badge" id="notification-badge">0</span>
            </button>
            <button class="tab" onclick="showTab('history')">历史记录</button>
        </div>

        <!-- 账号管理 -->
        <div id="accounts-tab" class="tab-content active">
            <div class="panel">
                <div class="control-panel">
                    <button class="btn btn-primary" onclick="showAddModal()">+ 添加账号</button>
                    <button class="btn btn-success" onclick="startAllPurchase()">全部启动</button>
                    <button class="btn btn-danger" onclick="stopAllPurchase()">全部停止</button>
                </div>

                <table class="account-table">
                    <thead>
                        <tr>
                            <th>状态</th>
                            <th>账号</th>
                            <th>目标套餐</th>
                            <th>自动支付</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="account-list">
                        <tr><td colspan="5">加载中...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="panel">
                <h3>实时日志</h3>
                <div class="logs" id="logs">
                    <div class="line">等待日志...</div>
                </div>
            </div>
        </div>

        <!-- 抢购监控 -->
        <div id="monitor-tab" class="tab-content">
            <div class="panel">
                <h3>抢购状态监控</h3>
                <div id="monitor-content">
                    <p>请切换到"账号管理"页面启动抢购</p>
                </div>
            </div>
        </div>

        <!-- 通知 -->
        <div id="notifications-tab" class="tab-content">
            <div class="panel">
                <div class="control-panel">
                    <h3>待支付订单</h3>
                    <button class="btn btn-danger" onclick="clearAllOrders()">清除全部</button>
                </div>
                <div id="orders-list">
                    <div class="empty-state">暂无待支付订单</div>
                </div>
            </div>
        </div>

        <!-- 历史记录 -->
        <div id="history-tab" class="tab-content">
            <div class="panel">
                <h3>抢购历史</h3>
                <div id="history-content">
                    <p>暂无历史记录</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加账号模态框 -->
    <div class="modal" id="add-modal">
        <div class="modal-content">
            <h3>添加账号</h3>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="input-username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="input-password" placeholder="请输入密码">
            </div>
            <div class="form-group">
                <label>目标套餐 (勾选想要的套餐，设置优先级，1=最想要)</label>
                <div class="plan-selector" id="add-plan-selector">
                    <!-- 套餐选项由JS生成 -->
                </div>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="input-auto-pay" checked> 自动支付（余额充足时自动扣款）
                </label>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="input-enabled" checked> 启用账号
                </label>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="hideAddModal()">取消</button>
                <button class="btn btn-primary" onclick="addAccount()">确定</button>
            </div>
        </div>
    </div>

    <!-- 编辑账号模态框 -->
    <div class="modal" id="edit-modal">
        <div class="modal-content">
            <h3>编辑账号</h3>
            <input type="hidden" id="edit-account-id">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="edit-username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码（留空则不修改）</label>
                <input type="password" id="edit-password" placeholder="留空则不修改">
            </div>
            <div class="form-group">
                <label>目标套餐 (勾选想要的套餐，设置优先级，1=最想要)</label>
                <div class="plan-selector" id="edit-plan-selector">
                    <!-- 套餐选项由JS生成 -->
                </div>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="edit-auto-pay"> 自动支付
                </label>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="edit-enabled"> 启用账号
                </label>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="hideEditModal()">取消</button>
                <button class="btn btn-primary" onclick="saveEditAccount()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // 可选套餐列表
        const AVAILABLE_PLANS = [
            { plan: 'max', duration: 'monthly', name: 'Max 包月', key: 'max_monthly' },
            { plan: 'max', duration: 'quarterly', name: 'Max 包季', key: 'max_quarterly' },
            { plan: 'max', duration: 'yearly', name: 'Max 包年', key: 'max_yearly' },
            { plan: 'pro', duration: 'monthly', name: 'Pro 包月', key: 'pro_monthly' },
            { plan: 'pro', duration: 'quarterly', name: 'Pro 包季', key: 'pro_quarterly' },
            { plan: 'pro', duration: 'yearly', name: 'Pro 包年', key: 'pro_yearly' },
        ];

        // 库存统计数据缓存
        let inventoryStats = null;

        // 加载库存统计数据
        async function loadInventoryStats() {
            try {
                const resp = await fetch('/api/inventory-stats');
                inventoryStats = await resp.json();
                return inventoryStats;
            } catch (e) {
                console.error('加载库存统计失败:', e);
                return { has_data: false };
            }
        }

        // 获取成功率显示HTML
        function getSuccessRateHtml(planKey) {
            if (!inventoryStats || !inventoryStats.has_data) {
                return '';
            }

            const planData = inventoryStats.plans[planKey];
            if (!planData) {
                return '<span class="success-rate none">暂无数据</span>';
            }

            const score = planData.success_score;
            let rateClass = 'low';
            if (score >= 70) rateClass = 'high';
            else if (score >= 40) rateClass = 'medium';

            // 找到排名
            let rank = 1;
            for (const [key, _] of inventoryStats.ranking) {
                if (key === planKey) break;
                rank++;
            }

            return `<span class="success-rate ${rateClass}" title="成功率: ${score}%, 出现率: ${(planData.appearance_rate * 100).toFixed(1)}%, 平均持续: ${planData.avg_duration.toFixed(0)}秒, 排名: ${rank}/${inventoryStats.ranking.length}">${score.toFixed(0)}% #${rank}</span>`;
        }

        // 生成套餐选择器HTML
        async function generatePlanSelector(selectorId, selectedPlans = []) {
            // 确保库存统计已加载
            if (!inventoryStats) {
                await loadInventoryStats();
            }

            const container = document.getElementById(selectorId);

            let statsHint = '';
            if (inventoryStats && inventoryStats.has_data) {
                // 显示推荐提示
                const topPlans = inventoryStats.ranking.slice(0, 3);
                statsHint = `<div class="plan-stats-hint">
                    📊 根据历史数据分析，推荐选择：
                    ${topPlans.map(([key, data], i) => {
                        const plan = AVAILABLE_PLANS.find(p => p.key === key);
                        return `<span class="rank">#${i+1} ${plan ? plan.name : key} (${data.success_score.toFixed(0)}%)</span>`;
                    }).join(' ')}
                </div>`;
            }

            container.innerHTML = AVAILABLE_PLANS.map((p, index) => {
                const selected = selectedPlans.find(s => s.plan === p.plan && s.duration === p.duration);
                const checked = selected ? 'checked' : '';
                const disabled = selected ? '' : 'disabled';
                const priority = selected ? selected.priority : '';
                const successRateHtml = getSuccessRateHtml(p.key);

                return `
                    <div class="plan-option ${disabled}" id="${selectorId}-option-${index}">
                        <input type="checkbox" ${checked} onchange="togglePlanOption('${selectorId}', ${index})">
                        <span class="plan-name">${p.name}</span>
                        ${successRateHtml}
                        <select class="priority-select" onchange="updatePlanPriority('${selectorId}', ${index}, this.value)">
                            <option value="1" ${priority === 1 ? 'selected' : ''}>优先级 1</option>
                            <option value="2" ${priority === 2 ? 'selected' : ''}>优先级 2</option>
                            <option value="3" ${priority === 3 ? 'selected' : ''}>优先级 3</option>
                            <option value="4" ${priority === 4 ? 'selected' : ''}>优先级 4</option>
                            <option value="5" ${priority === 5 ? 'selected' : ''}>优先级 5</option>
                            <option value="6" ${priority === 6 ? 'selected' : ''}>优先级 6</option>
                        </select>
                    </div>
                `;
            }).join('') + statsHint;
        }

        // 切换套餐选项
        function togglePlanOption(selectorId, index) {
            const option = document.getElementById(`${selectorId}-option-${index}`);
            const checkbox = option.querySelector('input[type="checkbox"]');
            if (checkbox.checked) {
                option.classList.remove('disabled');
            } else {
                option.classList.add('disabled');
            }
        }

        // 更新套餐优先级
        function updatePlanPriority(selectorId, index, priority) {
            // 优先级已更新
        }

        // 获取选中的套餐
        function getSelectedPlans(selectorId) {
            const plans = [];
            AVAILABLE_PLANS.forEach((p, index) => {
                const option = document.getElementById(`${selectorId}-option-${index}`);
                if (!option) return;
                const checkbox = option.querySelector('input[type="checkbox"]');
                if (checkbox && checkbox.checked) {
                    const prioritySelect = option.querySelector('.priority-select');
                    plans.push({
                        plan: p.plan,
                        duration: p.duration,
                        priority: parseInt(prioritySelect.value)
                    });
                }
            });
            // 按优先级排序
            plans.sort((a, b) => a.priority - b.priority);
            return plans;
        }

        // Tab 切换
        function showTab(name) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(name + '-tab').classList.add('active');
            event.target.classList.add('active');
            if (name === 'notifications') {
                loadPendingOrders();
            }
        }

        // 加载账号列表
        function loadAccounts() {
            fetch('/api/accounts')
                .then(r => r.json())
                .then(data => {
                    const tbody = document.getElementById('account-list');
                    if (!data.accounts || data.accounts.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5">暂无账号，请添加</td></tr>';
                        return;
                    }

                    tbody.innerHTML = data.accounts.map(acc => `
                        <tr>
                            <td><span class="status-dot ${acc.status}"></span></td>
                            <td>${escapeHtml(acc.username)}</td>
                            <td>${acc.target_plans.map(p =>
                                `<span class="plan-tag priority-${p.priority}">${p.plan} ${getDurationText(p.duration)} (${p.priority})</span>`
                            ).join(' ')}</td>
                            <td>${acc.auto_pay ? '✓' : '✗'}</td>
                            <td>
                                <button class="btn btn-primary" onclick="startPurchase('${acc.id}')">抢购</button>
                                <button class="btn btn-secondary" onclick="editAccount('${acc.id}')">编辑</button>
                                <button class="btn btn-danger" onclick="deleteAccount('${acc.id}')">删除</button>
                            </td>
                        </tr>
                    `).join('');
                });
        }

        // 时长文本转换
        function getDurationText(duration) {
            const map = { 'monthly': '包月', 'quarterly': '包季', 'yearly': '包年' };
            return map[duration] || duration;
        }

        // 加载日志
        function loadLogs() {
            fetch('/api/logs')
                .then(r => r.json())
                .then(data => {
                    if (data.logs && data.logs.length > 0) {
                        const logsDiv = document.getElementById('logs');
                        logsDiv.innerHTML = data.logs.slice(-50).map(line => {
                            let cls = '';
                            if (line.includes('ERROR')) cls = 'error';
                            else if (line.includes('成功')) cls = 'success';
                            return `<div class="line ${cls}">${escapeHtml(line)}</div>`;
                        }).join('');
                        logsDiv.scrollTop = logsDiv.scrollHeight;
                    }
                });
        }

        // 加载待支付订单
        function loadPendingOrders() {
            fetch('/api/pending-orders')
                .then(r => r.json())
                .then(data => {
                    const badge = document.getElementById('notification-badge');
                    const ordersList = document.getElementById('orders-list');

                    if (data.count > 0) {
                        badge.textContent = data.count;
                        badge.classList.add('show');
                    } else {
                        badge.classList.remove('show');
                    }

                    if (!data.orders || data.orders.length === 0) {
                        ordersList.innerHTML = '<div class="empty-state">暂无待支付订单</div>';
                        return;
                    }

                    ordersList.innerHTML = data.orders.map((order, index) => `
                        <div class="order-card">
                            <h4>⚠️ 待支付订单</h4>
                            <p><strong>账号:</strong> ${escapeHtml(order.account_username || '-')}</p>
                            <p><strong>产品:</strong> ${escapeHtml(order.product_name || '-')}</p>
                            <p><strong>金额:</strong> ¥${order.amount || 0}</p>
                            <p><strong>订单号:</strong> ${order.biz_id || '-'}</p>
                            <p><strong>时间:</strong> ${order.created_at || '-'}</p>
                            <div class="order-actions">
                                <a href="${order.pay_url || 'https://open.bigmodel.cn/console/overview'}"
                                   target="_blank" class="pay-link">去支付</a>
                                <button class="btn btn-danger" onclick="clearOrder(${index})">忽略</button>
                            </div>
                        </div>
                    `).join('');
                });
        }

        function clearOrder(index) {
            fetch(`/api/pending-orders/${index}`, {method: 'DELETE'})
                .then(() => loadPendingOrders());
        }

        function clearAllOrders() {
            if (!confirm('确定清除所有待支付订单?')) return;
            fetch('/api/pending-orders/clear', {method: 'POST'})
                .then(() => loadPendingOrders());
        }

        // 添加账号模态框
        async function showAddModal() {
            await generatePlanSelector('add-plan-selector');
            document.getElementById('add-modal').classList.add('show');
        }

        function hideAddModal() {
            document.getElementById('add-modal').classList.remove('show');
        }

        function addAccount() {
            const username = document.getElementById('input-username').value.trim();
            const password = document.getElementById('input-password').value.trim();
            const autoPay = document.getElementById('input-auto-pay').checked;
            const enabled = document.getElementById('input-enabled').checked;

            if (!username || !password) {
                alert('用户名和密码不能为空');
                return;
            }

            const targetPlans = getSelectedPlans('add-plan-selector');
            if (targetPlans.length === 0) {
                alert('请至少选择一个目标套餐');
                return;
            }

            fetch('/api/accounts', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username, password, target_plans: targetPlans, auto_pay: autoPay, enabled
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    hideAddModal();
                    loadAccounts();
                    document.getElementById('input-username').value = '';
                    document.getElementById('input-password').value = '';
                } else {
                    alert('添加失败: ' + (data.error || '未知错误'));
                }
            });
        }

        // 编辑账号
        async function editAccount(accountId) {
            const resp = await fetch('/api/accounts');
            const data = await resp.json();
            const account = data.accounts.find(a => a.id === accountId);
            if (!account) {
                alert('账号不存在');
                return;
            }

            document.getElementById('edit-account-id').value = account.id;
            document.getElementById('edit-username').value = account.username;
            document.getElementById('edit-password').value = '';
            document.getElementById('edit-auto-pay').checked = account.auto_pay;
            document.getElementById('edit-enabled').checked = account.enabled;

            await generatePlanSelector('edit-plan-selector', account.target_plans);
            document.getElementById('edit-modal').classList.add('show');
        }

        function hideEditModal() {
            document.getElementById('edit-modal').classList.remove('show');
        }

        function saveEditAccount() {
            const accountId = document.getElementById('edit-account-id').value;
            const username = document.getElementById('edit-username').value.trim();
            const password = document.getElementById('edit-password').value.trim();
            const autoPay = document.getElementById('edit-auto-pay').checked;
            const enabled = document.getElementById('edit-enabled').checked;

            if (!username) {
                alert('用户名不能为空');
                return;
            }

            const targetPlans = getSelectedPlans('edit-plan-selector');
            if (targetPlans.length === 0) {
                alert('请至少选择一个目标套餐');
                return;
            }

            const updateData = {
                username,
                target_plans: targetPlans,
                auto_pay: autoPay,
                enabled: enabled
            };

            if (password) {
                updateData.password = password;
            }

            fetch(`/api/accounts/${accountId}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(updateData)
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    hideEditModal();
                    loadAccounts();
                } else {
                    alert('保存失败: ' + (data.error || '未知错误'));
                }
            });
        }

        // 删除账号
        function deleteAccount(id) {
            if (!confirm('确定删除该账号?')) return;
            fetch(`/api/accounts/${id}`, {method: 'DELETE'})
                .then(() => loadAccounts());
        }

        // 启动单个抢购
        function startPurchase(id) {
            fetch(`/api/accounts/${id}/start`, {method: 'POST'})
                .then(r => r.json())
                .then(data => alert(data.success ? '抢购成功!' : '抢购失败'));
        }

        // 启动全部抢购
        function startAllPurchase() {
            if (!confirm('确定启动所有启用的账号抢购?')) return;
            fetch('/api/purchase/start', {method: 'POST'})
                .then(r => r.json())
                .then(data => {
                    alert(data.success ? '抢购任务已启动' : '启动失败');
                });
        }

        // 停止全部抢购
        function stopAllPurchase() {
            fetch('/api/purchase/stop', {method: 'POST'})
                .then(() => alert('已停止'));
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 初始化
        (async function init() {
            await loadInventoryStats();
            await generatePlanSelector('add-plan-selector');
        })();
        setInterval(loadAccounts, 5000);
        setInterval(loadLogs, 3000);
        setInterval(loadPendingOrders, 10000);
        loadAccounts();
        loadLogs();
        loadPendingOrders();
    </script>
</body>
</html>
